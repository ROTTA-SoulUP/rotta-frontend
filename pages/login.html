<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login &mdash; Rotta</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/login.css">

    <!-- JS -->
    <script src="../assets/js/validacao/verificacao-login.js"></script>
    <script src="../assets/js/login.js" defer></script>

</head>

<body>


    <div class="demo-aviso">
        <i class="fa-solid fa-circle-info"></i>
        <div>
            <p><strong>Ambiente de demonstração</strong></p>
            <p>Não é necessário criar conta. Use qualquer e-mail e senha para entrar.</p>
        </div>
    </div>
    <div class="login-wrapper">

        <!-- LADO ESQUERDO — painel visual -->
        <aside class="login-visual">
            <div class="visual-logo">
            </div>
        </aside>

        <!-- LADO DIREITO — formulário -->
        <main class="login-form-area">
            <div class="form-container">

                <h2 class="form-titulo">Login</h2>

                <form id="loginForm" novalidate>

                    <!-- E-mail -->
                    <div class="form-group">
                        <label for="email">Username</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope input-icone"></i>
                            <input type="email" id="email" name="email" placeholder="@mail.com" required>
                        </div>
                        <span class="error-msg" id="erro-email"></span>
                    </div>

                    <!-- Senha -->
                    <div class="form-group">
                        <label for="senha">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icone"></i>
                            <input type="password" id="senha" name="senha" placeholder="password" required>
                            <button type="button" class="btn-olho" id="btn-olho" aria-label="Mostrar senha">
                                <i class="fa-regular fa-eye" id="icone-olho"></i>
                            </button>
                        </div>
                        <span class="error-msg" id="erro-senha"></span>
                    </div>

                    <!-- Remember me + esqueci senha -->
                    <div class="form-opcoes">
                        <label class="checkbox-label">
                            <input type="checkbox" id="lembrar" name="lembrar">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="link-esqueceu">Esqueceu a Senha?</a>
                    </div>

                    <button type="submit" class="btn-entrar">Entrar</button>

                    <p class="form-cadastro">
                        Não Tem Uma Conta?
                        <a href="#" class="link-cadastro">Inscrever-se</a>
                    </p>

                </form>

                <!-- Divisor -->
                <div class="divisor">
                    <span></span>
                    <p>Logar Com</p>
                    <span></span>
                </div>

                <!-- Botões sociais -->
                <div class="social-btns">
                    <button class="btn-social btn-facebook" aria-label="Facebook">
                        <i class="fa-brands fa-facebook-f"></i>
                    </button>
                    <button class="btn-social btn-google" aria-label="Google">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#4285F4"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                            <path fill="#EA4335"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                    </button>
                    <button class="btn-social btn-apple" aria-label="Apple">
                        <i class="fa-brands fa-apple"></i>
                    </button>
                </div>

            </div>
        </main>

    </div>

</body>

</html>
